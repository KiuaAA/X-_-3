<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-_-3 Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>X-_-3 Launcher</h1>
    </header>
    <main class="main">
      <div class="accounts">
        <h2>Accounts</h2>
        <button id="offline-login">Offline Account</button>
        <button id="microsoft-login">Microsoft Account</button>
      </div>
      <div class="versions">
        <h2>Minecraft Versions</h2>
        <ul id="version-list"></ul>
      </div>
      <div class="mods">
        <h2>Mods</h2>
        <button id="mod-manager-btn">Open Mod Manager</button>
      </div>
      <button id="launch-btn">Launch Minecraft</button>
    </main>
  </div>
  <script src="renderer.js"></script>
</body>
  </html>
